slot_duration: 15  # Minutes per scheduling slot

# Global court buffers (applied to days without their own court_buffers).
# Set to empty list to disable globally: court_buffers: []
# court_buffers:
#   - courts: [1, 2, 3, 4, 5, 6, 7, 8]
#     duration: 30
#     interval: 120
#     courts_at_once: 4

days:
  - name: "Saturday"
    start_time: "09:00"
    # Per-day court buffers (overrides global court_buffers for this day)
    court_buffers:
      - courts: [1, 2, 3, 4, 5, 6, 7, 8]
        duration: 30
        interval: 120        # every 2 hours
        courts_at_once: 4    # block 4 courts at a time, rotating
    courts:
      - numbers: [1, 2, 3, 4, 5, 6, 7, 8]
        end_time: "21:10"
      - numbers: [9, 10, 11, 12]
        start_time: "09:15"
        end_time: "21:10"
    sessions:
      - name: "Saturday Morning"
        start_time: "09:00"
        end_time: "13:00"
      - name: "Saturday Afternoon"
        start_time: "13:00"
        end_time: "18:00"
      - name: "Saturday Evening"
        start_time: "18:00"
        end_time: "21:10"

  - name: "Sunday"
    start_time: "09:00"
    court_buffers:
      - courts: [1, 2, 3, 4]
        duration: 30
        interval: 180        # every 3 hours
        courts_at_once: 1    # block 1 courts at a time, rotating
    courts:
      - numbers: [1, 2, 3, 4]
        end_time: "16:00"
      - numbers: [5, 6, 7, 8]
        end_time: "18:00"
    sessions:
      - name: "Sunday Morning"
        start_time: "09:00"
        end_time: "13:00"
      - name: "Sunday Afternoon"
        start_time: "13:00"
        end_time: "18:00"
